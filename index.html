<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SubZero Shaved Ice</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: url('Colorful shaved ice cups assortment.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* RED BOX */
    .title-box {
      background-color: red;
      padding: 20px 40px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* HALF WHITE / HALF BLUE TEXT */
    .title-box h1 {
      margin: 0;
      font-size: 2.8rem;
      letter-spacing: 2px;
      font-weight: bold;

      background: linear-gradient(to bottom, white 50%, #007BFF 50%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      /* Outline for readability */
      -webkit-text-stroke: 1px black;
    }

    /* Navigation */
    nav {
      display: flex;
      gap: 20px;
    }

    nav a {
      text-decoration: none;
      color: #007BFF;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 10px 20px;
      border: 2px solid #007BFF;
      border-radius: 25px;
      transition: all 0.3s ease;
      background-color: rgba(255, 255, 255, 0.8);
    }

    nav a:hover {
      background-color: #007BFF;
      color: white;
      transform: scale(1.05);
    }

    /* Mobile */
    @media (max-width: 600px) {
      .title-box h1 {
        font-size: 2rem;
      }

      nav {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>

<body>

  <div class="title-box">
    <h1>Sub Zero Shaved Ice</h1>
  </div>

  <nav>
    <a href="about.html">About</a>
    <a href="#menu">Menu</a>
    <a href="#pricing">Pricing</a>
  </nav>

</body>
</html>
